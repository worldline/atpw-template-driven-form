<h1>Version form</h1>
<form>
  <label>Version name:</label>
  <input type="text" [(ngModel)]="versionName" required name="versionName" #nameRef="ngModel"/>

  <label>Type of version:</label>
  <select [(ngModel)]="selectedType" name="type">
    <option *ngFor="let type of types" [value]="type">{{ type }}</option>
  </select>
</form>

<h2>Value and validity</h2>
<p><strong>Form value:</strong> {{ versionName }} - {{ selectedType }}</p>
<p><strong>Is version name input valid ?</strong> {{ nameRef.valid }}</p>
